<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access | Millionaire JABER</title>
    <style>
        /* Modern Aesthetic Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column; /* Changed to column to stack card and video */
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Card with Floating Animation */
        .login-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 380px;
            text-align: center;
            z-index: 10;
            animation: float 4s ease-in-out infinite;
            transition: transform 0.3s ease;
            margin-bottom: 30px; /* Space between card and video */
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .login-card:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.15);
        }

        h2 {
            color: #fff;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        p.subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus {
            background: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .toggle-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            color: #888;
            transition: 0.3s;
        }

        .toggle-btn:hover {
            color: #ff6b6b;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(90deg, #ff6b6b, #ff8e8e);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 25px rgba(255, 107, 107, 0.5);
            background: linear-gradient(90deg, #ff5252, #ff7b7b);
        }

        #error-msg {
            color: #ff4d4d;
            font-size: 12px;
            margin-top: 15px;
            display: none;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px;
            border-radius: 5px;
        }

        /* Video Container Styles */
        .video-container {
            position: relative;
            width: 560px; /* Standard video width */
            height: 315px; /* Standard video height (16:9 aspect ratio) */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden; /* Ensures video stays within rounded corners */
            z-index: 10;
            display: flex; /* To center the iframe */
            justify-content: center;
            align-items: center;
            padding: 15px; /* Inner padding for the video */
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border-radius: 15px; /* Match container border-radius for video */
            border: none;
        }

        /* Decorative bubbles */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            z-index: 1;
            filter: blur(5px); /* Soften the bubbles */
        }
        .bubble:nth-child(1) { width: 150px; height: 150px; top: 10%; left: 10%; animation: bubbleFloat 10s ease-in-out infinite alternate; }
        .bubble:nth-child(2) { width: 200px; height: 200px; bottom: 10%; right: 10%; animation: bubbleFloat 12s ease-in-out infinite alternate-reverse; }
        .bubble:nth-child(3) { width: 80px; height: 80px; top: 60%; left: 20%; animation: bubbleFloat 8s ease-in-out infinite alternate; }
        .bubble:nth-child(4) { width: 120px; height: 120px; top: 30%; right: 15%; animation: bubbleFloat 9s ease-in-out infinite alternate-reverse; }

        @keyframes bubbleFloat {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            50% { transform: translateY(-20px) scale(1.05); opacity: 0.8; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* Responsive for smaller screens */
        @media (max-width: 768px) {
            .login-card {
                width: 90%;
                padding: 30px 20px;
            }
            .video-container {
                width: 90%;
                height: auto; /* Allow height to adjust */
                padding: 10px;
            }
            .video-container iframe {
                aspect-ratio: 16 / 9; /* Maintain aspect ratio */
            }
            h2 {
                font-size: 1.8em;
            }
            p.subtitle {
                font-size: 0.9em;
            }
            .bubble {
                display: none; /* Hide bubbles on small screens for performance/simplicity */
            }
        }
    </style>
</head>
<body>

    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>

    <div class="login-card">
        <h2>Login Area</h2>
        <p class="subtitle">Please enter your personal secret code to unlock the Trading Dashboard.</p>
        
        <div class="input-group">
            <input type="password" id="accessCode" placeholder="Your secret code...">
            <span class="toggle-btn" id="eyeIcon" onclick="togglePassword()">👁️</span>
        </div>
        
        <button onclick="checkCode()">Verify & Enter</button>
        <p id="error-msg">❌ Access Denied! Incorrect code.</p>
    </div>

    <div class="video-container">
        <iframe 
            src="video/Img 7904.mp4" 
            title="Motivational Video" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('accessCode');
            const icon = document.getElementById('eyeIcon');
            if (input.type === "password") {
                input.type = "text";
                icon.innerText = "🔒"; // Changed to lock icon
            } else {
                input.type = "password";
                icon.innerText = "👁️"; // Changed back to eye icon
            }
        }

        function checkCode() {
            const codeInput = document.getElementById('accessCode').value;
            const errorMsg = document.getElementById('error-msg');
            const secretCode = "Yes i can do it";

            if (codeInput === secretCode) {
                window.open("D:/1.My%20own%20website/Main%20Page/index.html", "_blank");
            } else {
                errorMsg.style.display = "block";
                // Add a temporary shake animation for the card
                const loginCard = document.querySelector('.login-card');
                loginCard.style.animation = "shake 0.5s ease-in-out";
                setTimeout(() => {
                    loginCard.style.animation = "float 4s ease-in-out infinite"; // Revert to original float
                }, 500);
            }
        }
        
        /* New Shake Animation for error feedback */
        const styleSheet = document.createElement("style");
        styleSheet.type = "text/css";
        styleSheet.innerText = `
            @keyframes shake {
                0%, 100% { transform: translateX(0) translateY(0); }
                20%, 60% { transform: translateX(-5px) translateY(-5px); }
                40%, 80% { transform: translateX(5px) translateY(5px); }
            }
        `;
        document.head.appendChild(styleSheet);
    </script>
</body>
</html>
