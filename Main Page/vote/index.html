<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Risk Disclaimer - Adaptive</title>
    <style>
        body {
            background-color: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .premium-vote-card {
            max-width: 400px;
            width: 90%;
            background: #111;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 25px;
            color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .dot { 
            width: 10px; height: 10px; background: #ff3131; border-radius: 50%; 
            box-shadow: 0 0 12px #ff3131; animation: blink 1.5s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .desc { font-size: 14px; line-height: 1.6; color: #ccc; margin-bottom: 20px; }
        .desc b { color: #fff; }

        .btn-group { display: flex; gap: 10px; }
        .v-btn { 
            flex: 1; padding: 12px; border-radius: 8px; border: none; 
            cursor: pointer; font-weight: bold; transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .yes-glow { background: #00ff88; color: #000; }
        .no-btn { background: #222; color: #fff; border: 1px solid #444; }
        .v-btn:hover { transform: translateY(-3px); filter: brightness(1.1); }

        .result-container { margin-top: 20px; }
        .label-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
        .bar-bg { background: #000; height: 12px; border-radius: 6px; overflow: hidden; border: 1px solid #333; }
        .bar-fill { 
            height: 100%; width: 0%; 
            background: linear-gradient(90deg, #00ff88, #008f4c); 
            transition: width 1.2s cubic-bezier(0.1, 0.5, 0.1, 1); 
        }

        /* Change Vote Link */
        .change-vote-btn {
            display: block;
            margin-top: 15px;
            font-size: 12px;
            color: #888;
            text-decoration: underline;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            width: 100%;
            text-align: center;
        }
        .change-vote-btn:hover { color: #fff; }

        .footer-note { font-size: 11px; color: #555; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="premium-vote-card">
    <div class="content">
        <div class="header-wrap">
            <span class="dot"></span>
            <h3 style="margin: 0; font-size: 18px;">Risk Acknowledgement</h3>
        </div>
        
        <p class="desc">
            Apnara shobai nijer risk-e trade niben. Ami sudhu analysis korbo, kono loss-er jonno ami dayi thakbo na. 
            <b>Raji thakle 'HA' te click korun.</b>
        </p>

        <div id="voteBtns" class="btn-group">
            <button onclick="handleVote('yes')" class="v-btn yes-glow">HA, Ami Raji</button>
            <button onclick="handleVote('no')" class="v-btn no-btn">NA</button>
        </div>

        <div id="resultDisplay" class="result-container" style="display: none;">
            <div class="label-row">
                <span>Voters Agreement</span>
                <span id="percentText" style="color: #00ff88;">0%</span>
            </div>
            <div class="bar-bg">
                <div id="barFill" class="bar-fill"></div>
            </div>
            
            <button onclick="resetVote()" class="change-vote-btn">Change my vote</button>
            <p class="footer-note">Response recorded in real-time.</p>
        </div>
    </div>
</div>

<script>
    // Logic to handle voting
    function handleVote(choice) {
        let yesCount = parseInt(localStorage.getItem('trade_v_yes') || 0);
        let noCount = parseInt(localStorage.getItem('trade_v_no') || 0);

        // Store user's specific choice to undo it later if needed
        localStorage.setItem('user_last_choice', choice);

        if(choice === 'yes') {
            yesCount++;
            localStorage.setItem('trade_v_yes', yesCount);
        } else {
            noCount++;
            localStorage.setItem('trade_v_no', noCount);
        }

        localStorage.setItem('has_voted_trade', 'true');
        updateView();
    }

    // Logic to reset/change vote
    function resetVote() {
        let lastChoice = localStorage.getItem('user_last_choice');
        let yesCount = parseInt(localStorage.getItem('trade_v_yes') || 0);
        let noCount = parseInt(localStorage.getItem('trade_v_no') || 0);

        // Agge jeta click korsilo oita mukhustho kore minus kora
        if (lastChoice === 'yes' && yesCount > 0) {
            yesCount--;
            localStorage.setItem('trade_v_yes', yesCount);
        } else if (lastChoice === 'no' && noCount > 0) {
            noCount--;
            localStorage.setItem('trade_v_no', noCount);
        }

        // Status clear kora jate button abar ashe
        localStorage.removeItem('has_voted_trade');
        localStorage.removeItem('user_last_choice');

        // UI reset
        document.getElementById('voteBtns').style.display = 'flex';
        document.getElementById('resultDisplay').style.display = 'none';
        document.getElementById('barFill').style.width = '0%';
    }

    function updateView() {
        let y = parseInt(localStorage.getItem('trade_v_yes') || 0);
        let n = parseInt(localStorage.getItem('trade_v_no') || 0);
        let total = y + n;

        if (total > 0) {
            let percentage = Math.round((y / total) * 100);
            
            document.getElementById('voteBtns').style.display = 'none';
            document.getElementById('resultDisplay').style.display = 'block';
            
            setTimeout(() => {
                document.getElementById('barFill').style.width = percentage + '%';
                document.getElementById('percentText').innerText = percentage + '%';
            }, 100);
        }
    }

    window.onload = function() {
        if(localStorage.getItem('has_voted_trade')) {
            updateView();
        }
    };
</script>

</body>
</html>
