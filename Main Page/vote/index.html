<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Risk Disclaimer - Dual Stats</title>
    <style>
        body { background-color: #0d0d0d; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        
        .premium-vote-card {
            max-width: 400px; width: 95%; background: #111; border: 1px solid #333;
            border-radius: 15px; padding: 25px; color: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .header-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .dot { width: 10px; height: 10px; background: #ff3131; border-radius: 50%; box-shadow: 0 0 10px #ff3131; }

        .desc { font-size: 14px; line-height: 1.6; color: #ccc; margin-bottom: 20px; }
        
        .btn-group { display: flex; gap: 10px; }
        .v-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .yes-glow { background: #00ff88; color: #000; }
        .no-btn { background: #333; color: #fff; border: 1px solid #444; }

        /* Results Styling */
        .result-container { margin-top: 20px; display: none; }
        .stat-box { margin-bottom: 15px; }
        .label-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; color: #aaa; }
        
        .bar-bg { background: #222; height: 8px; border-radius: 4px; overflow: hidden; }
        .bar-fill-yes { height: 100%; width: 0%; background: #00ff88; transition: width 1s ease; }
        .bar-fill-no { height: 100%; width: 0%; background: #ff3131; transition: width 1s ease; }

        .change-vote { display: block; text-align: center; font-size: 11px; color: #666; cursor: pointer; margin-top: 15px; background: none; border: none; width: 100%; text-decoration: underline; }
    </style>
</head>
<body>

<div class="premium-vote-card">
    <div class="header-wrap">
        <span class="dot"></span>
        <h3 style="margin:0; font-size:18px;">Risk Acknowledgement</h3>
    </div>
    
    <p class="desc">
        Apnara shobai nijer risk-e trade niben. Ami sudhu analysis korbo, kono loss-er jonno ami dayi thakbo na.Raji thakle <b>HA</b>te click korun <b style="color: rgb(153, 243, 158);">insahallah loss hbe nah😎</b>
    </p>

    <div id="voteBtns" class="btn-group">
        <button onclick="handleVote('yes')" class="v-btn yes-glow">HA, Ami Raji</button>
        <button onclick="handleVote('no')" class="v-btn no-btn">NA</button>
    </div>

    <div id="resultDisplay" class="result-container">
        <div class="stat-box">
            <div class="label-row"><span>Raji (Yes)</span><span id="yText">0%</span></div>
            <div class="bar-bg"><div id="yBar" class="bar-fill-yes"></div></div>
        </div>
        <div class="stat-box">
            <div class="label-row"><span>Raji Na (No)</span><span id="nText">0%</span></div>
            <div class="bar-bg"><div id="nBar" class="bar-fill-no"></div></div>
        </div>
        
        <button onclick="resetVote()" class="change-vote">Change Vote</button>
    </div>
</div>

<script>
    function handleVote(choice) {
        let yes = parseInt(localStorage.getItem('v_y') || 0);
        let no = parseInt(localStorage.getItem('v_n') || 0);

        if(choice === 'yes') { yes++; localStorage.setItem('v_y', yes); }
        else { no++; localStorage.setItem('v_n', no); }

        localStorage.setItem('v_choice', choice);
        localStorage.setItem('v_done', 'true');
        updateView();
    }

    function resetVote() {
        let last = localStorage.getItem('v_choice');
        let yes = parseInt(localStorage.getItem('v_y') || 0);
        let no = parseInt(localStorage.getItem('v_n') || 0);

        if(last === 'yes' && yes > 0) localStorage.setItem('v_y', yes - 1);
        if(last === 'no' && no > 0) localStorage.setItem('v_n', no - 1);

        localStorage.removeItem('v_done');
        location.reload(); // Refresh to reset UI
    }

    function updateView() {
        let y = parseInt(localStorage.getItem('v_y') || 0);
        let n = parseInt(localStorage.getItem('v_n') || 0);
        let total = y + n;

        if (total > 0) {
            document.getElementById('voteBtns').style.display = 'none';
            document.getElementById('resultDisplay').style.display = 'block';

            let yPer = Math.round((y / total) * 100);
            let nPer = 100 - yPer;

            setTimeout(() => {
                document.getElementById('yBar').style.width = yPer + '%';
                document.getElementById('yText').innerText = yPer + '%';
                document.getElementById('nBar').style.width = nPer + '%';
                document.getElementById('nText').innerText = nPer + '%';
            }, 100);
        }
    }

    if(localStorage.getItem('v_done')) updateView();
</script>

</body>
</html>
